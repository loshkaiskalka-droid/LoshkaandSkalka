<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина — Ложка & Скалка</title>
    <style>
        :root {
            --bg: #faf6f0;
            --text: #2d2621;
            --text-light: #70655c;
            --primary: #c84b31;
            --primary-hover: #a33822;
            --card-bg: #ffffff;
            --border: #eedecf;
            --title-font: 'Georgia', serif;
            --main-font: 'Helvetica Neue', Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--main-font);
            padding: 20px 10px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px dashed var(--border);
        }

        h1 {
            font-family: var(--title-font);
            font-size: 24px;
            color: var(--primary);
        }

        .back-link {
            color: var(--text-light);
            text-decoration: none;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .cart-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        .cart-items {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid var(--border);
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
        }

        .item-details {
            flex-grow: 1;
        }

        .item-title {
            font-family: var(--title-font);
            font-size: 16px;
            margin-bottom: 4px;
        }

        .item-meta {
            font-size: 13px;
            color: var(--text-light);
        }

        .item-price-block {
            text-align: right;
            font-weight: bold;
        }

        .item-del-btn {
            background: none;
            border: none;
            color: #d9534f;
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
        }

        .order-form-block {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .form-title {
            font-family: var(--title-font);
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 5px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--main-font);
            font-size: 15px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0;
            padding-top: 15px;
            border-top: 2px solid var(--border);
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: var(--primary-hover);
        }

        .empty-msg {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Ваш заказ</h1>
        <a href="index.html" class="back-link">← Вернуться к меню</a>
    </header>

    <div class="cart-layout" id="cart-layout"></div>
</div>

<script>
    let cart = JSON.parse(localStorage.getItem('cart')) || {};

    function renderCart() {
        const layout = document.getElementById('cart-layout');
        const itemsArray = Object.values(cart);

        if (itemsArray.length === 0) {
            layout.innerHTML = `
                <div class="empty-msg">
                    <p style="font-size: 18px; font-family: var(--title-font); margin-bottom: 15px;">В корзине пока пусто</p>
                    <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: bold;">Заглянуть в меню</a>
                </div>
            `;
            return;
        }

        let itemsHTML = '<div class="cart-items">';
        let totalSum = 0;

        itemsArray.forEach(item => {
            const itemTotal = item.price * item.quantity;
            totalSum += itemTotal;

            itemsHTML += `
                <div class="cart-item">
                    <img src="${item.image}" class="item-img" alt="${item.title}">
                    <div class="item-details">
                        <h3 class="item-title">${item.title}</h3>
                        <p class="item-meta">${item.weight} | ${item.quantity} шт.</p>
                    </div>
                    <div class="item-price-block">
                        <span>${itemTotal} ₽</span>
                    </div>
                    <button class="item-del-btn" onclick="removeItem(${item.id})">🗑️</button>
                </div>
            `;
        });
        itemsHTML += '</div>';

        const formHTML = `
            <div class="order-form-block">
                <h3 class="form-title">Данные для доставки</h3>
                <form id="checkout-form" onsubmit="handleOrderSubmit(event)">
                    <div class="form-group">
                        <label for="username">Ваше имя *</label>
                        <input type="text" id="username" required placeholder="Иван Иванов">
                    </div>
                    <div class="form-group">
                        <label for="userphone">Телефон *</label>
                        <input type="tel" id="userphone" required placeholder="+7 (999) 123-45-67">
                    </div>
                    <div class="form-group">
                        <label for="useraddress">Адрес доставки *</label>
                        <textarea id="useraddress" rows="3" required placeholder="Улица, дом, квартира, подъезд"></textarea>
                    </div>
                    
                    <div class="total-row">
                        <span>Итого к оплате:</span>
                        <span>${totalSum} ₽</span>
                    </div>
                    
                    <button type="submit" class="submit-btn" id="send-order-btn">Оформить заказ на дом</button>
                </form>
            </div>
        `;

        layout.innerHTML = itemsHTML + formHTML;
    }

    function removeItem(id) {
        delete cart[id];
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
    }

    async function handleOrderSubmit(event) {
        event.preventDefault();

        const btn = document.getElementById('send-order-btn');
        btn.innerText = "Оформляем заказ...";
        btn.disabled = true;

        const orderData = {
            name: document.getElementById('username').value,
            phone: document.getElementById('userphone').value,
            address: document.getElementById('useraddress').value,
            cart_items: Object.values(cart).map(item => ({
                id: int(item.id),
                title: item.title,
                price: int(item.price),
                quantity: int(item.quantity)
            }))
        };

        try {
            // СВЯЗЬ С ТВОИМ СЕРВЕРОМ RENDER
            const response = await fetch('https://loshkaandskalka.onrender.com/api/order', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(orderData)
            });

            const result = await response.json();

            if (response.ok && result.success) {
                alert('🎉 Заказ успешно принят «Ложка & Скалка»! Чат-бот уже прислал нам уведомление.');
                localStorage.removeItem('cart');
                window.location.href = 'index.html';
            } else {
                throw new Error(result.detail || 'Ошибка сервера');
            }

        } catch (error) {
            console.error('Ошибка отправки заказа:', error);
            alert('🛑 Ошибка: не удалось связаться с сервером на Render. Проверьте логи сервиса.');
            btn.innerText = "Оформить заказ на дом";
            btn.disabled = false;
        }
    }

    function int(value) {
        return parseInt(value) || 0;
    }

    window.onload = renderCart;
</script>
</body>
</html>
