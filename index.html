<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ложка & Скалка — Домашняя кухня</title>
    <style>
        :root {
            --bg: #faf6f0;
            --text: #2d2621;
            --text-light: #70655c;
            --primary: #c84b31;
            --primary-hover: #a33822;
            --card-bg: #ffffff;
            --border: #eedecf;
            --tag-bg: #f4ebe1;
            --error: #d9534f;
            
            --title-font: 'Georgia', serif;
            --main-font: 'Helvetica Neue', Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--main-font);
            line-height: 1.5;
            padding: 20px 15px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 2px dashed var(--border);
            margin-bottom: 40px;
        }

        .logo-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
        }

        .brand-name {
            font-family: var(--title-font);
            font-size: 22px;
            font-weight: bold;
            color: var(--primary);
        }

        .cart-badge-btn {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .cart-badge-btn:hover {
            background: var(--primary-hover);
        }

        .cart-count {
            background: white;
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 14px;
        }

        .section-title {
            font-family: var(--title-font);
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--text);
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(200, 75, 49, 0.08);
        }

        .card-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--tag-bg);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid var(--border);
            z-index: 2;
        }

        /* Кликабельные зоны карточки делаем с указателем курсора */
        .card-click-zone {
            cursor: pointer;
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .card-title {
            font-family: var(--title-font);
            font-size: 18px;
            margin-bottom: 8px;
        }

        .card-desc {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 15px;
            background: var(--bg);
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .price {
            font-size: 18px;
            font-weight: bold;
            color: var(--text);
        }

        .counter-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg);
            padding: 4px;
            border-radius: 25px;
            border: 1px solid var(--border);
        }

        .counter-btn {
            background: white;
            border: 1px solid var(--border);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quantity-val {
            font-size: 14px;
            font-weight: bold;
            min-width: 15px;
            text-align: center;
        }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-btn.added {
            background: var(--text-light);
        }

        /* КРАСИВОЕ МОДАЛЬНОЕ ОКНО ДЛЯ СМАРТФОНОВ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(45, 38, 33, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 15px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-window {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-window {
            transform: translateY(0);
        }

        .modal-close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid var(--border);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .modal-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-title {
            font-family: var(--title-font);
            font-size: 22px;
            margin-bottom: 10px;
            color: var(--text);
        }

        .modal-full-desc {
            color: var(--text-light);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
            white-space: pre-line; /* Сохраняет абзацы текста из базы данных */
        }

        .modal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-block">
            <img src="logo.png" class="logo-img" alt="Ложка & Скалка">
            <span class="brand-name">Ложка & Скалка</span>
        </div>
        <a href="cart.html" class="cart-badge-btn">
            🛒 Корзина <span class="cart-count" id="global-cart-count">0</span>
        </a>
    </header>

    <h2 class="section-title" id="special-title">Сегодня в меню</h2>
    <div class="bento-grid" id="special-menu-grid"></div>

    <h2 class="section-title">Основное домашнее меню</h2>
    <div class="bento-grid" id="regular-menu-grid"></div>
</div>

<div class="modal-overlay" id="product-modal" onclick="closeModal(event)">
    <div class="modal-window">
        <button class="modal-close-btn" onclick="toggleModal(false)">✕</button>
        <img src="" class="modal-img" id="modal-image" alt="">
        <div class="modal-body">
            <h3 class="modal-title" id="modal-title">Название блюда</h3>
            <div class="card-meta" id="modal-weight">Вес: 0г</div>
            <p class="modal-full-desc" id="modal-description">Полное описание содержимого еды...</p>
            
            <div class="modal-footer">
                <span class="price" id="modal-price">0 ₽</span>
                <span style="font-size: 13px; color: var(--text-light);">Нажмите «Добавить» на карточке для заказа</span>
            </div>
        </div>
    </div>
</div>

<script>
    const daysOfWeek = ["Воскресенье", "Понедельник", "Вторник", "Среда", "Четверг", "Пятница", "Суббота"];
    const currentDayIndex = new Date().getDay();
    const currentDayName = daysOfWeek[currentDayIndex];

    let productsMock = [];
    let cart = JSON.parse(localStorage.getItem('cart')) || {};

    async function loadMenuFromServer() {
        try {
            const response = await fetch('https://loshkaandskalka.onrender.com/api/products');
            if (!response.ok) throw new Error('Ошибка сети');
            
            productsMock = await response.json();
            initData();
        } catch (error) {
            console.error('Не удалось загрузить меню:', error);
            document.getElementById('special-menu-grid').innerHTML = 
                `<p style="grid-column: 1/-1; text-align:center; color: var(--error); padding: 10px; font-weight: bold;">
                    🛑 Не удалось загрузить меню. Проверьте статус бэкенда на Render.
                </p>`;
        }
    }

    function initData() {
        document.getElementById('special-title').innerText = `Особое блюдо дня (${currentDayName})`;
        
        const specialGrid = document.getElementById('special-menu-grid');
        const regularGrid = document.getElementById('regular-menu-grid');
        
        specialGrid.innerHTML = '';
        regularGrid.innerHTML = '';

        let hasSpecial = false;

        productsMock.forEach(prod => {
            const quantity = cart[prod.id] ? cart[prod.id].quantity : 1;
            const isAdded = cart[prod.id] !== undefined;

            const cardHTML = `
                <div class="card" id="product-${prod.id}">
                    ${prod.day !== 'Все дни' ? `<div class="card-tag">${prod.day}</div>` : ''}
                    
                    <div class="card-click-zone" onclick="openProductDetails(${prod.id})">
                        <img src="${prod.image}" class="card-img" alt="${prod.title}">
                        <div style="padding: 15px 15px 0 15px;">
                            <h3 class="card-title">${prod.title}</h3>
                            <p class="card-desc">${prod.description}</p>
                            <div class="card-meta">Вес: ${prod.weight}</div>
                        </div>
                    </div>

                    <div class="card-content" style="padding-top: 0;">
                        <div class="card-actions">
                            <span class="price">${prod.price} ₽</span>
                            <div class="counter-group">
                                <button class="counter-btn" onclick="changeQty(${prod.id}, -1)">-</button>
                                <span class="quantity-val" id="qty-${prod.id}">${quantity}</span>
                                <button class="counter-btn" onclick="changeQty(${prod.id}, 1)">+</button>
                                <button class="add-btn ${isAdded ? 'added' : ''}" id="btn-${prod.id}" onclick="handleCartClick(${prod.id})">
                                    ${isAdded ? 'Добавлено' : 'Добавить'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            if (prod.day === currentDayName) {
                specialGrid.innerHTML += cardHTML;
                hasSpecial = true;
            } else if (prod.day === "Все дни") {
                regularGrid.innerHTML += cardHTML;
            }
        });

        if(!hasSpecial) {
            specialGrid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color: var(--text-light); padding: 10px;">На сегодня особых блюд дня нет, но основное меню всегда открыто!</p>`;
        }
        updateCartHeader();
    }

    // ЛОГИКА ОКНА ПОДРОБНОСТЕЙ
    function openProductDetails(id) {
        const product = productsMock.find(p => p.id === id);
        if (!product) return;

        // Наполняем модальное окно данными выбранного блюда
        document.getElementById('modal-image').src = product.image;
        document.getElementById('modal-image').alt = product.title;
        document.getElementById('modal-title').innerText = product.title;
        document.getElementById('modal-weight').innerText = `Вес: ${product.weight}`;
        document.getElementById('modal-description').innerText = product.description;
        document.getElementById('modal-price').innerText = `${product.price} ₽`;

        // Открываем окно
        toggleModal(true);
    }

    function toggleModal(isOpen) {
        const modal = document.getElementById('product-modal');
        if (isOpen) {
            modal.classList.add('active');
        } else {
            modal.classList.remove('active');
        }
    }

    // Закрытие при клике на темную область вокруг окна
    function closeModal(event) {
        if (event.target.id === 'product-modal') {
            toggleModal(false);
        }
    }

    function changeQty(id, delta) {
        const qtyElement = document.getElementById(`qty-${id}`);
        let currentQty = parseInt(qtyElement.innerText);
        currentQty += delta;
        if (currentQty < 1) currentQty = 1;
        qtyElement.innerText = currentQty;

        if (cart[id]) {
            cart[id].quantity = currentQty;
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartHeader();
        }
    }

    function handleCartClick(id) {
        const btn = document.getElementById(`btn-${id}`);
        const qty = parseInt(document.getElementById(`qty-${id}`).innerText);
        const product = productsMock.find(p => p.id === id);

        if (cart[id]) {
            delete cart[id];
            btn.innerText = "Добавить";
            btn.classList.remove('added');
        } else {
            cart[id] = {
                id: product.id,
                title: product.title,
                price: product.price,
                weight: product.weight,
                day: product.day,
                image: product.image,
                quantity: qty
            };
            btn.innerText = "Добавлено";
            btn.classList.add('added');
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartHeader();
    }

    function updateCartHeader() {
        const totalItems = Object.values(cart).reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById('global-cart-count').innerText = totalItems;
    }

    window.onload = loadMenuFromServer;
</script>
</body>
</html>
