<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ложка & Скалка — Домашняя кухня</title>
    <style>
        :root {
            --bg: #faf6f0;
            --text: #2d2621;
            --text-light: #70655c;
            --primary: #c84b31;
            --primary-hover: #a33822;
            --card-bg: #ffffff;
            --border: #eedecf;
            --tag-bg: #f4ebe1;
            --error: #d9534f;
            
            --title-font: 'Georgia', serif;
            --main-font: 'Helvetica Neue', Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--main-font);
            line-height: 1.5;
            padding: 20px 15px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* НАВИГАЦИЯ */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 2px dashed var(--border);
            margin-bottom: 40px;
        }

        .logo-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
        }

        .brand-name {
            font-family: var(--title-font);
            font-size: 22px;
            font-weight: bold;
            color: var(--primary);
        }

        .cart-badge-btn {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .cart-badge-btn:hover {
            background: var(--primary-hover);
        }

        .cart-count {
            background: white;
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 14px;
        }

        /* БЕНТО-СЕТКА ДЛЯ МЕНЮ */
        .section-title {
            font-family: var(--title-font);
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--text);
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        /* КАРТОЧКА ТОВАРА */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(200, 75, 49, 0.08);
        }

        .card-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--tag-bg);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid var(--border);
            z-index: 2;
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .card-title {
            font-family: var(--title-font);
            font-size: 18px;
            margin-bottom: 8px;
        }

        .card-desc {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 15px;
            background: var(--bg);
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .price {
            font-size: 18px;
            font-weight: bold;
            color: var(--text);
        }

        .counter-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg);
            padding: 4px;
            border-radius: 25px;
            border: 1px solid var(--border);
        }

        .counter-btn {
            background: white;
            border: 1px solid var(--border);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quantity-val {
            font-size: 14px;
            font-weight: bold;
            min-width: 15px;
            text-align: center;
        }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-btn.added {
            background: var(--text-light);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-block">
            <img src="logo.png" class="logo-img" alt="Ложка & Скалка">
            <span class="brand-name">Ложка & Скалка</span>
        </div>
        <a href="cart.html" class="cart-badge-btn">
            🛒 Корзина <span class="cart-count" id="global-cart-count">0</span>
        </a>
    </header>

    <h2 class="section-title" id="special-title">Сегодня в меню</h2>
    <div class="bento-grid" id="special-menu-grid">
        </div>

    <h2 class="section-title">Основное домашнее меню</h2>
    <div class="bento-grid" id="regular-menu-grid">
        </div>
</div>

<script>
    // Логика определения дня недели
    const daysOfWeek = ["Воскресенье", "Понедельник", "Вторник", "Среда", "Четверг", "Пятница", "Суббота"];
    const currentDayIndex = new Date().getDay();
    const currentDayName = daysOfWeek[currentDayIndex];

    // Массив товаров, который мы наполним данными из базы данных Supabase через FastAPI
    let productsMock = [];
    let cart = JSON.parse(localStorage.getItem('cart')) || {};

    // ЗАГРУЗКА МЕНЮ С СЕРВЕРА
    async function loadMenuFromServer() {
        try {
            // Запрос идет на наш запущенный локально бэкенд main.py
            // При переносе на реальный хостинг поменяем этот URL на постоянный
            const response = await fetch('http://127.0.0.1:8000/api/products');
            if (!response.ok) throw new Error('Ошибка сети');
            
            productsMock = await response.json();
            
            // Если данные успешно прилетели, строим карточки на экране
            initData();
        } catch (error) {
            console.error('Не удалось загрузить меню:', error);
            document.getElementById('special-menu-grid').innerHTML = 
                `<p style="grid-column: 1/-1; text-align:center; color: var(--error); padding: 10px; font-weight: bold;">
                    🛑 Не удалось загрузить меню. Убедитесь, что Python-сервер запущен и работает.
                </p>`;
        }
    }

    // ОТРИСОВКА КАРТОЧЕК НА СТРАНИЦЕ
    function initData() {
        document.getElementById('special-title').innerText = `Особое блюдо дня (${currentDayName})`;
        
        const specialGrid = document.getElementById('special-menu-grid');
        const regularGrid = document.getElementById('regular-menu-grid');
        
        specialGrid.innerHTML = '';
        regularGrid.innerHTML = '';

        let hasSpecial = false;

        productsMock.forEach(prod => {
            // Если товар уже лежит в корзине, берем его количество, иначе ставим 1
            const quantity = cart[prod.id] ? cart[prod.id].quantity : 1;
            const isAdded = cart[prod.id] !== undefined;

            const cardHTML = `
                <div class="card" id="product-${prod.id}">
                    ${prod.day !== 'Все дни' ? `<div class="card-tag">${prod.day}</div>` : ''}
                    <img src="${prod.image}" class="card-img" alt="${prod.title}">
                    <div class="card-content">
                        <div>
                            <h3 class="card-title">${prod.title}</h3>
                            <p class="card-desc">${prod.description}</p>
                            <div class="card-meta">Вес: ${prod.weight}</div>
                        </div>
                        <div class="card-actions">
                            <span class="price">${prod.price} ₽</span>
                            <div class="counter-group">
                                <button class="counter-btn" onclick="changeQty(${prod.id}, -1)">-</button>
                                <span class="quantity-val" id="qty-${prod.id}">${quantity}</span>
                                <button class="counter-btn" onclick="changeQty(${prod.id}, 1)">+</button>
                                <button class="add-btn ${isAdded ? 'added' : ''}" id="btn-${prod.id}" onclick="handleCartClick(${prod.id})">
                                    ${isAdded ? 'Добавлено' : 'Добавить'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Сортируем блюда: под текущий день недели или в основное меню
            if (prod.day === currentDayName) {
                specialGrid.innerHTML += cardHTML;
                hasSpecial = true;
            } else if (prod.day === "Все дни") {
                regularGrid.innerHTML += cardHTML;
            }
        });

        // Если на сегодняшний день нет специального блюда
        if(!hasSpecial) {
            specialGrid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color: var(--text-light); padding: 10px;">На сегодня особых блюд дня нет, но основное домашнее меню всегда открыто!</p>`;
        }
        updateCartHeader();
    }

    // ИЗМЕНЕНИЕ КОЛИЧЕСТВА БЛЮД КНОПКАМИ +/-
    function changeQty(id, delta) {
        const qtyElement = document.getElementById(`qty-${id}`);
        let currentQty = parseInt(qtyElement.innerText);
        currentQty += delta;
        if (currentQty < 1) currentQty = 1;
        qtyElement.innerText = currentQty;

        // Если товар уже добавлен в корзину, обновляем количество и в памяти телефона
        if (cart[id]) {
            cart[id].quantity = currentQty;
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartHeader();
        }
    }

    // НАЖАТИЕ НА КНОПКУ ДОБАВИТЬ/УДАЛИТЬ С КОРЗИНЫ
    function handleCartClick(id) {
        const btn = document.getElementById(`btn-${id}`);
        const qty = parseInt(document.getElementById(`qty-${id}`).innerText);
        const product = productsMock.find(p => p.id === id);

        if (cart[id]) {
            // Если уже был в корзине — удаляем
            delete cart[id];
            btn.innerText = "Добавить";
            btn.classList.remove('added');
        } else {
            // Если не было — добавляем объект блюда со всеми параметрами
            cart[id] = {
                id: product.id,
                title: product.title,
                price: product.price,
                weight: product.weight,
                day: product.day,
                image: product.image,
                quantity: qty
            };
            btn.innerText = "Добавлено";
            btn.classList.add('added');
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartHeader();
    }

    // ОБНОВЛЕНИЕ ЦИФРЫ НА КНОПКЕ КОРЗИНЫ В ШАПКЕ
    function updateCartHeader() {
        const totalItems = Object.values(cart).reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById('global-cart-count').innerText = totalItems;
    }

    // Запускаем автоматический стук к серверу при загрузке страницы сайтом
    window.onload = loadMenuFromServer;
</script>
</body>
</html>
